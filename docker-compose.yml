version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-reciper}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-reciperdb}
      - REDIS_URL=redis://redis:6379/0
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=moondream
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - APP_DOMAIN=${APP_DOMAIN:-http://localhost:8000}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - media_data:/app/media
    command: sh -c "dos2unix /app/entrypoint.sh && bash /app/entrypoint.sh"

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: reciper
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reciperdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: reciper_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
  media_data:
