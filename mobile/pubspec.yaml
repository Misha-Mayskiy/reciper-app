name: reciper
description: Мобильный AI-ассистент питания, генерации рецептов и пошагового приготовления блюд.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.1
  fl_chart: ^0.68.0
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  image_picker: ^1.0.7
  lottie: ^3.1.0
  json_annotation: ^4.9.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.3
  freezed: ^2.4.5
  flutter_lints: ^3.0.1
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
